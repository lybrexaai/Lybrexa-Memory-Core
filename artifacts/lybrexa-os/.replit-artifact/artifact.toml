kind = "web"
previewPath = "/"
title = "Lybrexa OS"
version = "1.0.0"
id = "artifacts/lybrexa-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19581

[services.development]
run = "pnpm --filter @workspace/lybrexa-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lybrexa-os", "run", "build" ]
publicDir = "artifacts/lybrexa-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19581"
BASE_PATH = "/"
